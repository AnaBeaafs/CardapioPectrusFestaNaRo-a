<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cardápio Festa na Roça Pectrus</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      background: #000000;
    }

    .container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .image-container {
      flex: 1;
      overflow: hidden;
      position: relative;
      background: #000000; 
    }

    img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;       
      object-position: center;
      display: block;
    }

    @media (max-width: 600px) {
      img {
        object-fit: contain;
      }
    }

    @media (min-width: 1200px) {
      img {
        object-fit: contain;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="image-container">
      <img src="assets/cardapio.png" alt="Cardápio" id="cardapio-img">
    </div>

  </div>
</body>
</html>
